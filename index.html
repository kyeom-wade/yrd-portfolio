<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YRD — Architecture & Space Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page Transition -->
  <div class="page-transition"></div>

  <!-- Top Header (Scroll Responsive) -->
  <header class="top-header">
    <div class="header-content">
      <a href="index.html" class="header-brand">YRD</a>
      <nav class="header-nav">
        <a href="works.html">Works</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero Slider -->
  <section class="hero">
    <div class="hero-slides"></div>

    <!-- Project Info -->
    <div class="project-info">
      <h2 class="project-title"></h2>
      <p class="project-meta"></p>
    </div>

    <!-- Slide Counter -->
    <div class="slide-counter">
      <button class="prev-btn" aria-label="이전 슬라이드">&larr;</button>
      <span class="counter-text">1 / 7</span>
      <button class="next-btn" aria-label="다음 슬라이드">&rarr;</button>
    </div>
  </section>

<!-- Featured Works Section -->
  <section class="home-works">
    <div class="section-container">
      <div class="section-header">
        <h2>Selected Works</h2>
        <a href="works.html" class="view-all">전체 보기 &rarr;</a>
      </div>
      <div class="home-works-carousel">
        <button class="carousel-btn carousel-prev" aria-label="이전 작품">&larr;</button>
        <div class="home-works-track">
          <div class="home-works-grid"></div>
        </div>
        <button class="carousel-btn carousel-next" aria-label="다음 작품">&rarr;</button>
      </div>
    </div>
  </section>

  <!-- Services Section -->
  <section class="home-services">
    <div class="section-container">
      <h2>Services</h2>
      <div class="services-grid">
        <div class="service-item">
          <div class="service-number">01</div>
          <h3>주거 공간 설계</h3>
          <p>개인의 삶과 가치를 담아내는 주거 공간을 설계합니다.</p>
        </div>
        <div class="service-item">
          <div class="service-number">02</div>
          <h3>상업 공간 설계</h3>
          <p>브랜드의 정체성을 공간으로 표현합니다.</p>
        </div>
        <div class="service-item">
          <div class="service-number">03</div>
          <h3>문화 공간 설계</h3>
          <p>예술과 문화를 위한 영감을 주는 공간을 만듭니다.</p>
        </div>
        <div class="service-item">
          <div class="service-number">04</div>
          <h3>컨설팅</h3>
          <p>프로젝트 기획부터 완공까지 전 과정을 함께합니다.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Contact CTA Section -->
  <section class="home-contact">
    <div class="section-container">
      <div class="contact-cta">
        <h2>프로젝트를 시작하시겠습니까?</h2>
        <p>YRD와 함께 당신의 공간을 만들어보세요.</p>
        <a href="contact.html" class="cta-button">Contact Us</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>

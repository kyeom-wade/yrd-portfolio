backend:
  name: github
  repo: kyeom-wade/yrd-portfolio
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

# 로컬 개발용 (npx decap-server)
local_backend: true

collections:
  # --- 프로젝트 관리 ---
  - name: "projects"
    label: "프로젝트"
    label_singular: "프로젝트"
    description: "포트폴리오 프로젝트를 관리합니다."
    file: "data/projects.json"
    format: "json"
    fields:
      - name: "items"
        label: "프로젝트 목록"
        widget: "list"
        summary: "{{fields.title}} — {{fields.location}} ({{fields.year}})"
        fields:
          - { name: "title", label: "프로젝트명", widget: "string" }
          - { name: "location", label: "위치", widget: "string" }
          - { name: "year", label: "연도", widget: "string" }
          - { name: "image", label: "메인 이미지 (1920px)", widget: "image" }
          - { name: "thumbnail", label: "썸네일 이미지 (800px)", widget: "image" }

  # --- 철학 페이지 ---
  - name: "philosophy"
    label: "철학"
    file: "data/philosophy.json"
    format: "json"
    fields:
      - { name: "background_image", label: "배경 이미지", widget: "image" }
      - name: "paragraphs"
        label: "본문 단락"
        widget: "list"
        field: { name: "text", label: "단락", widget: "text" }

  # --- 연락처 ---
  - name: "contact"
    label: "연락처"
    file: "data/contact.json"
    format: "json"
    fields:
      - { name: "email", label: "이메일", widget: "string" }
      - { name: "phone", label: "전화번호", widget: "string" }
      - { name: "address", label: "주소", widget: "text" }
      - { name: "hours", label: "영업시간", widget: "text" }

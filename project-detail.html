<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — YRD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page Transition -->
  <div class="page-transition"></div>

  <!-- Top Header (Scroll Responsive) -->
  <header class="top-header">
    <div class="header-content">
      <a href="index.html" class="header-brand">YRD</a>
      <nav class="header-nav">
        <a href="works.html">Works</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Project Detail Content -->
  <main class="project-detail-page">
    <!-- Hero Image -->
    <section class="detail-hero">
      <div class="hero-image-container">
        <img class="detail-hero-image" src="" alt="" loading="eager">
      </div>
    </section>

    <!-- Project Info -->
    <section class="detail-info">
      <div class="info-container">
        <div class="info-header">
          <div class="back-link">
            <a href="works.html">&larr; Back to Works</a>
          </div>
          <h1 class="detail-title"></h1>
          <div class="detail-meta">
            <span class="meta-item location"></span>
            <span class="meta-item year"></span>
            <span class="meta-item category"></span>
          </div>
        </div>

        <div class="info-content">
          <div class="description-section">
            <h2>개요</h2>
            <p class="description-text"></p>
          </div>

          <div class="specs-section">
            <h2>건축 개요</h2>
            <dl class="specs-list">
              <div class="spec-item">
                <dt>면적</dt>
                <dd class="spec-area"></dd>
              </div>
              <div class="spec-item">
                <dt>용도</dt>
                <dd class="spec-usage"></dd>
              </div>
              <div class="spec-item">
                <dt>구조</dt>
                <dd class="spec-structure"></dd>
              </div>
              <div class="spec-item">
                <dt>재료</dt>
                <dd class="spec-materials"></dd>
              </div>
            </dl>
          </div>
        </div>
      </div>
    </section>

    <!-- Gallery -->
    <section class="detail-gallery">
      <div class="gallery-container"></div>
    </section>

    <!-- Navigation to Next/Prev Project -->
    <section class="detail-navigation">
      <a href="#" class="nav-prev" style="display:none;">
        <span class="nav-label">Previous</span>
        <span class="nav-title"></span>
      </a>
      <a href="#" class="nav-next" style="display:none;">
        <span class="nav-label">Next</span>
        <span class="nav-title"></span>
      </a>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>

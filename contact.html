<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — YRD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page Transition -->
  <div class="page-transition"></div>

  <!-- Right Logo Mark -->
  <div class="logo-mark">YRD</div>

  <!-- Contact Content -->
  <main class="contact-page">
    <div class="contact-left">
      <h1>Contact</h1>

      <div class="contact-info-group">
        <p class="label">Email</p>
        <p class="value" data-field="email"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">Phone</p>
        <p class="value" data-field="phone"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">Address</p>
        <p class="value" data-field="address"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">Hours</p>
        <p class="value" data-field="hours"></p>
      </div>
    </div>

    <div class="contact-right">
      <form class="contact-form" onsubmit="return false;">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" autocomplete="name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4"></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message &rarr;</button>
      </form>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="brand">YRD</a>
    <ul class="nav-links">
      <li><a href="works.html">Works</a></li>
      <li><a href="philosophy.html">Philosophy</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <script src="js/main.js"></script>
</body>
</html>

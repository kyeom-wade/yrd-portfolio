<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — YRD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page Transition -->
  <div class="page-transition"></div>

  <!-- Top Header (Scroll Responsive) -->
  <header class="top-header header-white">
    <div class="header-content">
      <a href="index.html" class="header-brand">YRD</a>
      <nav class="header-nav">
        <a href="works.html">Works</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Contact Content -->
  <main class="contact-page">
    <div class="contact-left">
      <h1>Contact</h1>
    </div>

    <div class="contact-right">
      <div class="contact-info-group">
        <p class="label">연락처</p>
        <p class="value" data-field="phone"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">이메일</p>
        <p class="value" data-field="email"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">인스타그램</p>
        <p class="value" data-field="instagram"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">주소</p>
        <p class="value" data-field="address"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">운영시간</p>
        <p class="value" data-field="hours"></p>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>

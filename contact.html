<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — YRD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page Transition -->
  <div class="page-transition"></div>

  <!-- Top Header (Scroll Responsive) -->
  <header class="top-header">
    <div class="header-content">
      <a href="index.html" class="header-brand">YRD</a>
      <nav class="header-nav">
        <a href="works.html">Works</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Contact Content -->
  <main class="contact-page">
    <div class="contact-left">
      <h1>Contact</h1>

      <div class="contact-info-group">
        <p class="label">Email</p>
        <p class="value" data-field="email"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">Phone</p>
        <p class="value" data-field="phone"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">Address</p>
        <p class="value" data-field="address"></p>
      </div>

      <div class="contact-info-group">
        <p class="label">Hours</p>
        <p class="value" data-field="hours"></p>
      </div>
    </div>

    <div class="contact-right">
      <form class="contact-form" action="https://formspree.io/f/mgodebdq" method="POST">
        <div class="form-group">
          <label for="name">성함</label>
          <input type="text" id="name" name="name" autocomplete="name" required>
        </div>

        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="project">프로젝트</label>
          <input type="text" id="project" name="project" required>
        </div>

        <div class="form-group">
          <label for="message">간략한 설명</label>
          <textarea id="message" name="message" rows="4" required></textarea>
        </div>

        <button type="submit" class="submit-btn">보내기 &rarr;</button>
      </form>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>

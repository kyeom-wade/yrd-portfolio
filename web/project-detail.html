<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — YRD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page Transition -->

  <!-- Top Header (Scroll Responsive) -->
  <header class="top-header header-white">
    <div class="header-content">
      <a href="index.html" class="header-brand">yrd</a>
      <button class="menu-btn" id="menuBtn">Menu</button>

    </div>
  </header>

  <!-- Project Detail Content -->
  <main class="project-detail-page">
    <!-- Hero Image -->
    <section class="detail-hero">
      <div class="hero-image-container">
        <img class="detail-hero-image" src="" alt="" loading="eager">
      </div>
    </section>

    <!-- Project Info -->
    <section class="detail-info">
      <div class="info-container">
        <div class="info-header">
          <h1 class="detail-title"></h1>
        </div>

        <div class="info-content">
          <div class="description-section">
            <p class="description-text"></p>
          </div>

          <div class="specs-section">
            <dl class="specs-list">
              <div class="spec-item">
                <dt>클라이언트</dt>
                <dd class="spec-client"></dd>
              </div>
              <div class="spec-item">
                <dt>연도</dt>
                <dd class="spec-year"></dd>
              </div>
              <div class="spec-item">
                <dt>면적</dt>
                <dd class="spec-area"></dd>
              </div>
              <div class="spec-item">
                <dt>용도</dt>
                <dd class="spec-usage"></dd>
              </div>
              <div class="spec-item">
                <dt>구조</dt>
                <dd class="spec-structure"></dd>
              </div>
              <div class="spec-item">
                <dt>재료</dt>
                <dd class="spec-materials"></dd>
              </div>
            </dl>
          </div>
        </div>
      </div>
    </section>

    <!-- Gallery -->
    <section class="detail-gallery">
      <div class="gallery-container"></div>
    </section>

    <!-- Navigation to Next/Prev Project -->
    <section class="detail-navigation">
      <a href="#" class="nav-prev" style="display:none;">
        <span class="nav-label">Previous</span>
        <span class="nav-title"></span>
      </a>
      <a href="#" class="nav-next" style="display:none;">
        <span class="nav-label">Next</span>
        <span class="nav-title"></span>
      </a>
    </section>
  </main>

  <div class="menu-overlay" id="menuOverlay">
    <a href="index.html" class="overlay-brand"><span class="ob-l">y</span><span class="ob-f ob-f1"><span class="ob-fi">eo</span></span><span class="ob-l">r</span><span class="ob-f ob-f2"><span class="ob-fi">um </span></span><span class="ob-l">d</span><span class="ob-f ob-f3"><span class="ob-fi">esign studio</span></span></a>
    <button class="menu-close" id="menuClose">Close</button>
    <nav class="overlay-nav">
      <a href="about.html">About</a>
      <a href="works.html">Project</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>

  <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YRD — Architecture & Space Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page Transition -->

  <!-- Top Header (Scroll Responsive) -->
  <header class="top-header header-light">
    <div class="header-content">
      <a href="index.html" class="header-brand"><img src="images/logo.svg" alt="YRD" class="header-logo"></a>
      <nav class="header-nav">
        <a href="works.html">Projects</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero Slider -->
  <section class="hero">
    <div class="hero-slides"></div>

    <!-- Project Info -->
    <div class="project-info">
      <h2 class="project-title"></h2>
      <p class="project-meta"></p>
    </div>

    <!-- Slide Counter -->
    <div class="slide-counter">
      <button class="prev-btn" aria-label="이전 슬라이드">&larr;</button>
      <span class="counter-text">1 / 7</span>
      <button class="next-btn" aria-label="다음 슬라이드">&rarr;</button>
    </div>
  </section>

<!-- Featured Works Section -->
  <section class="home-works">
    <div class="section-container">
      <div class="section-header">
        <h2>Works</h2>
        <a href="works.html" class="view-all">전체 보기 &rarr;</a>
      </div>
      <div class="home-works-carousel">
        <button class="carousel-btn carousel-prev" aria-label="이전 작품">&larr;</button>
        <div class="home-works-track">
          <div class="home-works-grid"></div>
        </div>
        <button class="carousel-btn carousel-next" aria-label="다음 작품">&rarr;</button>
      </div>
    </div>
  </section>

<!-- Contact CTA Section -->
  <section class="home-contact">
    <div class="section-container">
      <div class="contact-cta">
        <p>당신의 공간을 만들어보세요.</p>
        <a href="contact.html" class="cta-button">Contact Us</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
